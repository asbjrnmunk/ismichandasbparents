<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Have Asbjørn and Michelle become parents?</title>
  <script src="https://cdn.counter.dev/script.js" data-id="b3dc771d-812f-4e64-9ff1-986190e73657"
    data-utcoffset="1"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fdf6f0;
      font-family: Georgia, serif;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 3rem);
      color: #444;
      margin-bottom: 2rem;
      line-height: 1.4;
    }

    .answer-wrap {
      position: relative;
      display: inline-block;
    }

    .answer {
      font-size: clamp(2.25rem, 9vw, 5.5rem);
      font-weight: bold;
      color: #f4c430;
      line-height: 1;
      letter-spacing: -0.02em;
      animation: slam 1.8s cubic-bezier(0.22, 1, 0.36, 1) 2s both;
      transform-origin: center;
    }

    .subtitle {
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      color: #888;
      margin-top: 1.5rem;
      font-style: italic;
      opacity: 0;
      animation: fadein 1s ease-out 4s forwards;
    }

    .timestamp {
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      color: #bbb;
      margin-top: 2rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      opacity: 0;
      animation: fadein 1s ease-out 4.5s forwards;
    }

    @keyframes fadein {
      to {
        opacity: 1;
      }
    }

    @keyframes slam {
      0% {
        opacity: 0;
        transform: scale(4) translateY(-0.1em);
        filter: blur(12px);
      }

      70% {
        opacity: 1;
        transform: scale(0.95);
        filter: blur(0);
      }

      85% {
        transform: scale(1.04);
      }

      100% {
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <h1>Have Asbjørn and Michelle become parents yet?</h1>
  <div class="answer-wrap">
    <div class="answer">Not yet... 🫠</div>
  </div>
  <p class="subtitle">(They are still <i>impatiently</i> waiting...)</p>
  <p class="timestamp"></p>

  <script>
    (function () {
      // The answer is always "still no" — only the phrasing changes, paired
      // with a fresh "last updated" stamp to fake frequent updates.
      const MESSAGES = [
        { answer: "Not yet... 🫠", subtitle: "(They are still <i>impatiently</i> waiting...)" },
        { answer: "Still cooking 🍞", subtitle: "(Status: <i>extremely</i> pregnant)" },
        { answer: "Still nope 🤰", subtitle: "(The wait continues, ever so patiently.)" },
        { answer: "No news yet 📭", subtitle: "(Asbjørn keeps refreshing this page too)" },
        { answer: "Any day now... ⏳", subtitle: "(The hospital bag is packed. Still no baby.)" },
        { answer: "Soon™ ⏰", subtitle: "(The countdown continues...)" },
        { answer: "Patience, apparently... 🧘", subtitle: "(Still just the two of them — for now)" },
        { answer: "404: Baby still not found 🍼", subtitle: "(Have you tried turning Michelle off and on again?)" },
        { answer: "Bags are packed 🧳", subtitle: "(The hospital bag has its own hospital bag now.)" },
      ];

      const HOUR = 3600 * 1000;
      const EPOCH = Date.UTC(2026, 5, 18); // June 18, 2026 (month is 0-indexed) — safely before "now"

      // Deterministic PRNG so the schedule & message sequence are identical on
      // every load (a refresh must NOT reshuffle the answer).
      function mulberry32(seed) {
        return function () {
          seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
          let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      // Walk forward from EPOCH in pseudo-random 16–18h steps until we pass now.
      const now = Date.now();
      const rand = mulberry32(0x9e3779b9);
      let t = EPOCH, idx = 0, lastUpdate = EPOCH;
      while (true) {
        const next = t + (16 + rand() * 2) * HOUR; // 16–18 hours
        if (next > now) break;
        t = next; idx++; lastUpdate = t;
      }

      const msg = MESSAGES[idx % MESSAGES.length];
      document.querySelector(".answer").innerHTML = msg.answer;
      document.querySelector(".subtitle").innerHTML = msg.subtitle;

      // Relative "last updated" stamp (timezone-independent); ticks every minute.
      const stamp = document.querySelector(".timestamp");
      function render() {
        const mins = Math.max(0, Math.round((Date.now() - lastUpdate) / 60000));
        let s;
        if (mins < 1) s = "just now";
        else if (mins < 60) s = mins + (mins === 1 ? " minute ago" : " minutes ago");
        else { const h = Math.floor(mins / 60); s = h + (h === 1 ? " hour ago" : " hours ago"); }
        stamp.textContent = "Last updated " + s;
      }
      render();
      setInterval(render, 60000);
    })();
  </script>
</body>

</html>
