<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Have Asbjørn and Michelle become parents yet?</title>
  <script src="https://cdn.counter.dev/script.js" data-id="b3dc771d-812f-4e64-9ff1-986190e73657"
    data-utcoffset="1"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fdf6f0;
      font-family: Georgia, serif;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 3rem);
      color: #444;
      margin-bottom: 2rem;
      line-height: 1.4;
    }

    .answer-wrap {
      position: relative;
      display: inline-block;
    }

    .answer {
      font-size: clamp(2.25rem, 9vw, 5.5rem);
      font-weight: bold;
      color: #4a9e5c;
      line-height: 1;
      letter-spacing: -0.02em;
      animation: slam 1.8s cubic-bezier(0.22, 1, 0.36, 1) 2s both;
      transform-origin: center;
    }

    .subtitle {
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      color: #888;
      margin-top: 1.5rem;
      font-style: italic;
      opacity: 0;
      animation: fadein 1s ease-out 4s forwards;
    }

    .timestamp {
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      color: #bbb;
      margin-top: 2rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      opacity: 0;
      animation: fadein 1s ease-out 4.5s forwards;
    }

    @keyframes fadein {
      to {
        opacity: 1;
      }
    }

    @keyframes slam {
      0% {
        opacity: 0;
        transform: scale(4) translateY(-0.1em);
        filter: blur(12px);
      }

      70% {
        opacity: 1;
        transform: scale(0.95);
        filter: blur(0);
      }

      85% {
        transform: scale(1.04);
      }

      100% {
        transform: scale(1);
      }
    }

    .subtitle {
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      color: #888;
      margin-top: 1.5rem;
      font-style: italic;
      opacity: 0;
      animation: fadein 1s ease-out 4s forwards;
    }

    @keyframes fadein {
      to {
        opacity: 1;
      }
    }

    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <canvas id="confetti-canvas"></canvas>
  <h1>Have Asbjørn and Michelle become parents yet?</h1>
  <div class="answer-wrap">
    <div class="answer">YES</div>
  </div>
</body>

</html>
