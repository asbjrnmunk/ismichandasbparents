<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Have Asbjørn and Michelle become parents yet?</title>
  <script src="https://cdn.counter.dev/script.js" data-id="b3dc771d-812f-4e64-9ff1-986190e73657"
    data-utcoffset="1"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fdf6f0;
      font-family: Georgia, serif;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 3rem);
      color: #444;
      margin-bottom: 2rem;
      line-height: 1.4;
    }

    .answer-wrap {
      position: relative;
      display: inline-block;
    }

    .answer {
      font-size: clamp(4rem, 18vw, 10rem);
      font-weight: bold;
      color: #4a9e5c;
      line-height: 1;
      letter-spacing: -0.02em;
      animation: slam 1.8s cubic-bezier(0.22, 1, 0.36, 1) 2s both;
      transform-origin: center;
    }

    .subtitle {
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      color: #888;
      margin-top: 1.5rem;
      font-style: italic;
      opacity: 0;
      animation: fadein 1s ease-out 4s forwards;
    }

    @keyframes fadein {
      to {
        opacity: 1;
      }
    }

    @keyframes slam {
      0% {
        opacity: 0;
        transform: scale(4) translateY(-0.1em);
        filter: blur(12px);
      }

      70% {
        opacity: 1;
        transform: scale(0.95);
        filter: blur(0);
      }

      85% {
        transform: scale(1.04);
      }

      100% {
        transform: scale(1);
      }
    }

    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .footnote {
      position: fixed;
      bottom: 1rem;
      left: 0;
      right: 0;
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      color: #aaa;
      font-style: italic;
      opacity: 0;
      animation: fadein 1s ease-out 5s forwards;
    }
  </style>
</head>

<body>
  <canvas id="confetti-canvas"></canvas>
  <h1>Have Asbjørn and Michelle become parents yet?</h1>
  <div class="answer-wrap">
    <div class="answer">YES!</div>
  </div>
  <p class="subtitle">(Welcome to the world, Knud*!)</p>
  <p class="footnote">*name still to be decided...</p>

  <script>
    // Fire confetti once the "YES" slam animation has landed.
    setTimeout(launchConfetti, 3800);

    function launchConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const colors = ['#4a9e5c', '#f9ca24', '#e05555', '#6c5ce7', '#fd79a8', '#fdcb6e', '#00b894'];
      const particles = [];

      for (let i = 0; i < 180; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 4 + Math.random() * 10;
        particles.push({
          x: canvas.width / 2,
          y: canvas.height / 2,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 6,
          color: colors[Math.floor(Math.random() * colors.length)],
          w: 8 + Math.random() * 10,
          h: 4 + Math.random() * 6,
          rot: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.3,
          opacity: 1,
        });
      }

      function tick() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.35;
          p.vx *= 0.99;
          p.rot += p.rotSpeed;
          if (p.y > canvas.height * 0.7) p.opacity -= 0.02;
          if (p.opacity <= 0) continue;
          alive = true;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.globalAlpha = p.opacity;
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
        }
        if (alive) requestAnimationFrame(tick);
      }

      tick();
    }
  </script>
</body>

</html>
